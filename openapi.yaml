openapi: 3.1.0
info:
  title: Jitsi Portal API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/invites/exchange:
    post:
      summary: Exchange guest invite token for short-lived meeting access token
      operationId: exchangeInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteExchangeRequest'
      responses:
        '200':
          description: Invite exchanged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteExchangeResponse'
        '400':
          description: Invalid invite exchange request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Invite or meeting not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Invite exhausted or room closed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '410':
          description: Invite expired
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '500':
          description: Configuration incompatible
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user profile
      operationId: getAuthMe
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafeUserProfileResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/auth/logout:
    post:
      summary: Perform backend-managed RP-initiated logout
      operationId: logoutAuthSession
      responses:
        '302':
          description: Redirect to provider-managed OIDC logout endpoint
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Invalid or missing CSRF token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '400':
          description: Invalid request payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Token revoked
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Refresh token reuse detected
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/auth/refresh/revoke:
    post:
      summary: Revoke refresh token by token id
      operationId: revokeRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRevokeRequest'
      responses:
        '204':
          description: Token revoked
        '400':
          description: Invalid request payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/meetings/upcoming:
    get:
      summary: List upcoming meetings for authenticated user cabinet
      operationId: listUpcomingMeetings
      responses:
        '200':
          description: Upcoming meeting cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UpcomingMeetingCard'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/rooms:
    post:
      summary: Create a new room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Invalid request or config set
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Room name conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    get:
      summary: List rooms for a tenant
      operationId: listRooms
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paged list of rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedRoomResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/rooms/{roomId}:
    get:
      summary: Get room by ID
      operationId: getRoom
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    put:
      summary: Update room
      operationId: updateRoom
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
      responses:
        '200':
          description: Room updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Invalid request or config set
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Room name conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    delete:
      summary: Delete room
      operationId: deleteRoom
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Room deleted successfully
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Room has active meetings
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/rooms/{roomId}/close:
    post:
      summary: Close room
      operationId: closeRoom
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room closed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          description: Room already closed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Room has active meetings
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/rooms/{roomId}/meetings:
    get:
      summary: List meetings by room
      operationId: listMeetings
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paged list of meetings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedMeetingResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    post:
      summary: Create a meeting in room
      operationId: createMeeting
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeetingRequest'
      responses:
        '201':
          description: Meeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '400':
          description: Invalid request or schedule
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Room not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets:
    post:
      summary: Create config set
      operationId: createConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigSetRequest'
      responses:
        '201':
          description: Config set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '400':
          description: Invalid payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          description: Name conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    get:
      summary: List config sets by tenant
      operationId: listConfigSets
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paged config sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedConfigSetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /api/v1/config-sets/{configSetId}:
    get:
      summary: Get config set by id
      operationId: getConfigSet
      parameters:
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Config set details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    put:
      summary: Update config set
      operationId: updateConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigSetRequest'
      responses:
        '200':
          description: Config set updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '400':
          description: Invalid payload
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '409':
          description: Name conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/{configSetId}/activate:
    post:
      summary: Activate config set
      operationId: activateConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Config set activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '422':
          description: Activation is not allowed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/{configSetId}/deactivate:
    post:
      summary: Deactivate config set
      operationId: deactivateConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Config set deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/{configSetId}/rollout:
    post:
      summary: Rollout config set with dry-run validation
      operationId: rolloutConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rollout completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetRolloutResponse'
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '422':
          description: Rollout validation failed because config is incompatible
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/{configSetId}/compatibility:
    get:
      summary: Get config set compatibility diagnostics
      operationId: getConfigSetCompatibility
      parameters:
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Compatibility diagnostics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetCompatibilityResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/{configSetId}/rollback:
    post:
      summary: Rollback config set to previous valid one
      operationId: rollbackConfigSet
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: path
          name: configSetId
          required: true
          schema:
            type: string
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
        - in: query
          name: environmentType
          required: true
          schema:
            type: string
            enum: [DEV, TEST, PROD]
      responses:
        '200':
          description: Rollback completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetRolloutResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Rollout or config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '422':
          description: Rollback not allowed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/rollouts/latest:
    get:
      summary: Get latest rollout by tenant and environment
      operationId: getLatestConfigSetRollout
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
        - in: query
          name: environmentType
          required: true
          schema:
            type: string
            enum: [DEV, TEST, PROD]
      responses:
        '200':
          description: Latest rollout details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetRolloutResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Rollout not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/config-sets/active:
    get:
      summary: Get active config set by tenant and environment
      operationId: getActiveConfigSet
      parameters:
        - in: query
          name: tenantId
          required: true
          schema:
            type: string
        - in: query
          name: environmentType
          required: true
          schema:
            type: string
            enum: [DEV, TEST, PROD]
      responses:
        '200':
          description: Active config set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSetResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Active config set not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /api/v1/meetings/{meetingId}/access-token:
    post:
      summary: Issue a short-lived access token for a meeting
      operationId: issueMeetingAccessToken
      parameters:
        - name: meetingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingAccessTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/meetings/{meetingId}:
    get:
      summary: Get meeting by ID
      operationId: getMeeting
      parameters:
        - name: meetingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Meeting details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingResponse'
        '401':
          description: Authentication required
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '403':
          description: Access denied
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        '404':
          description: Meeting not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
    put:
      summary: Update meeting
      operationId: updateMeeting
      parameters:
