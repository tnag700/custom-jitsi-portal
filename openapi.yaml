components:
  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailResponse'
    ForbiddenError:
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailResponse'
    NotFoundError:
      description: Entity not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailResponse'
  schemas:
    InviteExchangeRequest:
      type: object
      properties:
        inviteToken:
          type: string
        displayName:
          type: string
      required:
        - inviteToken
    InviteExchangeResponse:
      type: object
      properties:
        joinUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        role:
          type: string
          enum: [participant]
        meetingId:
          type: string
      required:
        - joinUrl
        - expiresAt
        - role
        - meetingId
    MeetingAccessTokenResponse:
      type: object
      properties:
        joinUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        role:
          type: string
      required:
        - joinUrl
        - expiresAt
        - role
    SafeUserProfileResponse:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
        tenant:
          type: string
        claims:
          type: array
          items:
            type: string
      required:
        - id
        - displayName
        - email
        - tenant
        - claims
    AuthRefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    AuthRefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        role:
          type: string
          enum: [participant, moderator, host]
        tokenType:
          type: string
          enum: [Bearer]
      required:
        - accessToken
        - refreshToken
        - expiresAt
        - role
        - tokenType
    AuthRefreshRevokeRequest:
      type: object
      properties:
        tokenId:
          type: string
      required:
        - tokenId
    UpcomingMeetingCard:
      type: object
      properties:
        meetingId:
          type: string
        title:
          type: string
        startsAt:
          type: string
          format: date-time
        roomName:
          type: string
        joinAvailability:
          type: string
          enum: [available, scheduled]
      required:
        - meetingId
        - title
        - startsAt
        - roomName
        - joinAvailability
    ProblemDetailResponse:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        properties:
          type: object
          properties:
            errorCode:
              type: string
            traceId:
              type: string
          required:
            - errorCode
            - traceId
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          example: UP
        compatibilityStatus:
          type: string
          enum: [COMPATIBLE, INCOMPATIBLE]
          nullable: true
        configSetId:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
        traceId:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - status
    CreateRoomRequest:
